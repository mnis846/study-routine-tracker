<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#030712;overflow:hidden;font-family:system-ui,sans-serif;color:#e2e8f0}
  #wrap{position:relative;height:100vh;min-height:500px}
  canvas{display:block;width:100%;height:100%}
  .hud{position:absolute;top:8px;left:10px;right:10px;display:flex;justify-content:space-between;font-size:12px;font-weight:700;pointer-events:none;z-index:2}
  .pill{background:rgba(15,23,42,.75);border:1px solid #38bdf8;padding:6px 12px;border-radius:8px}
  .hint{position:absolute;bottom:10px;width:100%;text-align:center;font-size:12px;opacity:.7;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <div class="hud">
    <span class="pill" id="score">Score 0</span>
    <span class="pill">🚀 NEON SHOOTER</span>
    <span class="pill" id="hp">HP ███</span>
  </div>
  <canvas id="c" tabindex="0"></canvas>
  <div class="hint">← → move · SPACE shoot · touch sides + tap to fire</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,player,bullets=[],enemies=[],stars=[],particles=[],score=0,hp=3,keys={},touchX=null,fire=false,spawnT=0;
function resize(){const r=canvas.parentElement.getBoundingClientRect();W=canvas.width=r.width;H=canvas.height=Math.max(500,r.height);
  player={x:W/2,y:H-70,w:36,h:28,speed:5};}
resize();onresize=resize;
for(let i=0;i<80;i++)stars.push({x:Math.random()*2000,y:Math.random()*2000,s:Math.random()*2,v:1+Math.random()*3});
function reset(){score=0;hp=3;bullets=[];enemies=[];particles=[];updateHud();}
function updateHud(){
  document.getElementById('score').textContent='Score '+score;
  document.getElementById('hp').textContent='HP '+('█'.repeat(hp)+'░'.repeat(3-hp));
}
canvas.onkeydown=e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();shoot();}};
canvas.onkeyup=e=>keys[e.code]=false;
canvas.onclick=()=>canvas.focus();
canvas.onmousedown=()=>canvas.focus();
canvas.ontouchstart=e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();
  touchX=(t.clientX-r.left)*(W/r.width);if(t.clientY-r.top>H*.65)fire=true;};
canvas.ontouchmove=e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();
  touchX=(t.clientX-r.left)*(W/r.width);};
canvas.ontouchend=()=>fire=false;
function shoot(){bullets.push({x:player.x,y:player.y-20,vx:0,vy:-9});}
function spawnEnemy(){const w=28+Math.random()*20;enemies.push({x:w+Math.random()*(W-2*w),y:-30,w,h:22,
  vy:2+Math.random()*2.5,vx:(Math.random()-.5)*1.2,hp:1+Math.random()*2|0,hue:180+Math.random()*120});}
function boom(x,y,col){for(let i=0;i<14;i++){const a=Math.random()*6.28,s=2+Math.random()*4;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:25,col});}}
function rectHit(a,b){return Math.abs(a.x-b.x)<(a.w/2+b.w/2)&&Math.abs(a.y-b.y)<(a.h/2+b.h/2);}
function step(){
  if(keys.ArrowLeft||keys.KeyA)player.x-=player.speed;
  if(keys.ArrowRight||keys.KeyD)player.x+=player.speed;
  if(touchX!==null)player.x+=(touchX-player.x)*.18;
  player.x=Math.max(24,Math.min(W-24,player.x));
  if(keys.Space)shoot();
  if(fire&&Math.random()<.25)shoot();
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  bullets=bullets.filter(b=>b.y>-10);
  spawnT++;if(spawnT%35===0)spawnEnemy();
  enemies.forEach(en=>{
    en.y+=en.vy;en.x+=en.vx;if(en.x<en.w||en.x>W-en.w)en.vx*=-1;
    bullets.forEach((b,bi)=>{if(rectHit({x:b.x,y:b.y,w:6,h:10},{x:en.x,y:en.y,w:en.w,h:en.h})){
      en.hp--;bullets.splice(bi,1);boom(b.x,b.y,'#38bdf8');}});
    if(rectHit({x:player.x,y:player.y,w:player.w,h:player.h},{x:en.x,y:en.y,w:en.w,h:en.h})){
      en.hp=0;hp--;boom(en.x,en.y,'#f43f5e');updateHud();if(hp<=0){reset();}}
    if(en.hp<=0){score+=10;boom(en.x,en.y,'#a78bfa');}
  });
  enemies=enemies.filter(e=>e.hp>0&&e.y<H+40);
  stars.forEach(s=>{s.y+=s.v;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);
}
function drawShip(px,py){
  ctx.save();ctx.translate(px,py);
  ctx.shadowColor='#38bdf8';ctx.shadowBlur=14;
  ctx.fillStyle='#0ea5e9';ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(16,14);ctx.lineTo(0,8);ctx.lineTo(-16,14);ctx.closePath();ctx.fill();
  ctx.fillStyle='#7dd3fc';ctx.fillRect(-4,-6,8,12);ctx.restore();
}
function draw(){
  ctx.fillStyle='#030712';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.fillStyle='rgba(148,163,184,'+(s.s/2)+')';ctx.fillRect(s.x,s.y,s.s,s.s);});
  bullets.forEach(b=>{ctx.fillStyle='#67e8f9';ctx.shadowColor='#22d3ee';ctx.shadowBlur=8;
    ctx.fillRect(b.x-2,b.y-8,4,14);ctx.shadowBlur=0;});
  enemies.forEach(e=>{
    ctx.save();ctx.translate(e.x,e.y);ctx.fillStyle='hsl('+e.hue+',80%,55%)';
    ctx.beginPath();ctx.ellipse(0,0,e.w/2,e.h/2,0,0,6.28);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(-e.w/4,-2,e.w/2,4);ctx.restore();});
  drawShip(player.x,player.y);
  particles.forEach(p=>{ctx.globalAlpha=p.life/25;ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,3,3);ctx.globalAlpha=1;});
  if(hp<=0){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 22px system-ui';ctx.textAlign='center';
    ctx.fillText('Game over - click to restart',W/2,H/2);canvas.onclick=()=>{reset();canvas.onclick=()=>canvas.focus();};}
}
function loop(){step();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
