<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #0f172a, #1e3a5f);
    color: #e2e8f0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
  }
  .ring-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 24px; }
  .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 3px solid rgba(96,165,250,0.35);
    transition: transform 4s ease-in-out, opacity 0.5s;
  }
  .ring.core {
    background: radial-gradient(circle, rgba(52,211,153,0.45), rgba(30,58,95,0.2));
    border-color: rgba(52,211,153,0.6);
    box-shadow: 0 0 40px rgba(52,211,153,0.25);
  }
  .phase { font-size: 1.5rem; font-weight: 700; color: #6ee7b7; margin-bottom: 8px; }
  .timer { font-size: 2.5rem; font-weight: 300; letter-spacing: 0.05em; }
  .guide { margin-top: 16px; font-size: 14px; color: #94a3b8; text-align: center; max-width: 320px; line-height: 1.5; }
  button {
    margin-top: 20px; padding: 10px 24px; border: none; border-radius: 999px;
    background: #334155; color: #f1f5f9; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #475569; }
</style>
</head>
<body>
<div class="ring-wrap">
  <div class="ring" id="outer"></div>
  <div class="ring core" id="core"></div>
</div>
<div class="phase" id="phase">Breathe in</div>
<div class="timer" id="timer">4</div>
<p class="guide">4-7-8 breathing: inhale 4s · hold 7s · exhale 8s. Proven to calm the nervous system between study blocks.</p>
<button id="toggle">Pause</button>
<script>
const phases = [
  { name: 'Breathe in', secs: 4, scale: 1.15 },
  { name: 'Hold', secs: 7, scale: 1.15 },
  { name: 'Breathe out', secs: 8, scale: 0.75 },
];
let idx = 0, left = phases[0].secs, running = true, iv;
const core = document.getElementById('core');
const outer = document.getElementById('outer');

function applyScale(s) {
  core.style.transform = `scale(${s})`;
  outer.style.transform = `scale(${s * 1.08})`;
}

function tick() {
  document.getElementById('phase').textContent = phases[idx].name;
  document.getElementById('timer').textContent = left;
  applyScale(phases[idx].scale);
  if (left <= 0) {
    idx = (idx + 1) % phases.length;
    left = phases[idx].secs;
    applyScale(phases[idx].scale);
  }
  left--;
}

iv = setInterval(tick, 1000);
tick();

document.getElementById('toggle').onclick = () => {
  running = !running;
  document.getElementById('toggle').textContent = running ? 'Pause' : 'Resume';
  if (running) { iv = setInterval(tick, 1000); }
  else clearInterval(iv);
};
</script>
</body>
</html>
