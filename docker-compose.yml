services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
      POSTGRES_DB: study_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://study:study@db:5432/study_tracker
      AUTH_SECRET: ${AUTH_SECRET:-dev-change-me}
    depends_on:
      - db
    volumes:
      - ./assets:/app/assets

volumes:
  pgdata: