# Publish tablet-app/ to the gh-pages branch (static site for phones/tablets).
# Study data is NOT hosted — only the app shell (HTML/JS/CSS). Progress stays on-device.
#
# One-time (repo Settings → Pages):
#   Source: Deploy from a branch
#   Branch: gh-pages / (root)
#
# Student link: https://mnis846.github.io/study-routine-tracker/
# Instant CDN link (no Pages setup): see docs/TABLET_GUIDE.md

name: Deploy tablet app

on:
  push:
    branches: [tablet-android, main]
    paths:
      - "tablet-app/**"
      - ".github/workflows/deploy-tablet-app.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tablet-app-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -a tablet-app/. _site/
          touch _site/.nojekyll
          test -f _site/index.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          enable_jekyll: false
