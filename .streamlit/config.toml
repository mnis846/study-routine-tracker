[theme]
primaryColor = "#48BB78"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7FAFC"
textColor = "#1E3A5F"
font = "sans serif"

[client]
toolbarMode = "minimal"
showSidebarNavigation = false

[browser]
gatherUsageStats = false

# Friendlier defaults when hosting for phones / Android tablets on LAN
[server]
enableCORS = false
enableXsrfProtection = true
# Headless avoids auto-opening a desktop browser on shared hosts
headless = true