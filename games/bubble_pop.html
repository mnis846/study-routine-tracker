<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 50%, #312e81 100%);
    color: #e2e8f0;
    overflow: hidden;
    user-select: none;
  }
  #wrap { position: relative; width: 100%; height: 100vh; min-height: 480px; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  .hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none; z-index: 2;
  }
  .pill {
    background: rgba(15,23,42,0.65); backdrop-filter: blur(8px);
    border: 1px solid rgba(148,163,184,0.25);
    border-radius: 999px; padding: 8px 16px; font-size: 14px; font-weight: 600;
  }
  .hint {
    position: absolute; bottom: 14px; left: 0; right: 0; text-align: center;
    font-size: 13px; opacity: 0.75; pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <div class="hud">
    <span class="pill" id="score">Popped: 0</span>
    <span class="pill">🫧 Bubble Pop — click to release stress</span>
    <span class="pill" id="combo">Combo ×1</span>
  </div>
  <canvas id="c"></canvas>
  <div class="hint">Pop bubbles · build combos · breathe</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, bubbles = [], particles = [], score = 0, combo = 0, comboTimer = 0;
const colors = ['#60a5fa','#34d399','#a78bfa','#f472b6','#fbbf24','#38bdf8','#4ade80'];

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = r.width;
  H = canvas.height = Math.max(r.height, 480);
}
window.addEventListener('resize', resize);
resize();

function spawnBubble() {
  const r = 18 + Math.random() * 42;
  bubbles.push({
    x: r + Math.random() * (W - 2*r),
    y: H + r,
    r, vy: -0.4 - Math.random() * 1.2,
    vx: (Math.random() - 0.5) * 0.6,
    color: colors[Math.floor(Math.random() * colors.length)],
    wobble: Math.random() * Math.PI * 2,
  });
}

function pop(b, x, y) {
  combo = Math.min(combo + 1, 20);
  comboTimer = 90;
  score++;
  document.getElementById('score').textContent = 'Popped: ' + score;
  document.getElementById('combo').textContent = 'Combo ×' + combo;
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: 30 + Math.random()*20, color: b.color, r: 2 + Math.random()*3
    });
  }
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    const dx = mx - b.x, dy = my - b.y;
    if (dx*dx + dy*dy < (b.r+8)*(b.r+8)) {
      pop(b, b.x, b.y);
      bubbles.splice(i, 1);
      return;
    }
  }
  combo = 0;
  document.getElementById('combo').textContent = 'Combo ×1';
});

function draw() {
  ctx.fillStyle = 'rgba(15,23,42,0.18)';
  ctx.fillRect(0, 0, W, H);

  if (Math.random() < 0.035 && bubbles.length < 28) spawnBubble();

  bubbles.forEach(b => {
    b.y += b.vy; b.x += b.vx + Math.sin(b.wobble)*0.3; b.wobble += 0.02;
    if (b.x < b.r) b.vx += 0.05;
    if (b.x > W - b.r) b.vx -= 0.05;
    const g = ctx.createRadialGradient(b.x-b.r*0.3, b.y-b.r*0.3, 0, b.x, b.y, b.r);
    g.addColorStop(0, 'rgba(255,255,255,0.85)');
    g.addColorStop(0.35, b.color + 'aa');
    g.addColorStop(1, b.color + '22');
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
  });
  bubbles = bubbles.filter(b => b.y > -b.r - 10);

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
    ctx.globalAlpha = Math.max(p.life / 40, 0);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
    ctx.globalAlpha = 1;
  });
  particles = particles.filter(p => p.life > 0);

  if (comboTimer > 0) comboTimer--;
  else if (combo > 0) { combo = 0; document.getElementById('combo').textContent = 'Combo ×1'; }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
