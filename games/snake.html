<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:10px}
  h3{font-size:14px;color:#94a3b8;margin-bottom:8px}
  #board{display:grid;gap:2px;background:#1e293b;padding:6px;border-radius:12px;border:1px solid #334155;touch-action:manipulation}
  .cell{width:16px;height:16px;border-radius:3px;background:#0f172a}
  .snake{background:linear-gradient(135deg,#34d399,#10b981)}
  .head{background:linear-gradient(135deg,#6ee7b7,#34d399);box-shadow:0 0 6px #34d399}
  .food{background:radial-gradient(circle,#fbbf24,#f59e0b);border-radius:50%}
  .meta{margin-top:8px;font-size:13px;color:#94a3b8}
  .dpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,44px);gap:6px;margin-top:12px}
  .dpad button{border:none;border-radius:10px;background:#334155;color:#f8fafc;font-size:18px;cursor:pointer}
  .dpad button:active{background:#2563eb}
  .dpad .blank{background:transparent;cursor:default}
  .score{color:#34d399;font-weight:700}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.82);border-radius:12px;font-weight:600;cursor:pointer}
  .wrap{position:relative}
</style>
</head>
<body>
<h3>🐍 Snake — use buttons, arrows, or WASD</h3>
<div class="wrap">
  <div id="board"></div>
  <div class="overlay" id="overlay">Tap to start</div>
</div>
<p class="meta">Score: <span class="score" id="score">0</span></p>
<div class="dpad">
  <span class="blank"></span><button data-d="up">▲</button><span class="blank"></span>
  <button data-d="left">◀</button><button data-d="down">▼</button><button data-d="right">▶</button>
</div>
<script>
const SIZE=18,board=document.getElementById('board'),overlay=document.getElementById('overlay');
board.style.gridTemplateColumns=`repeat(${SIZE},16px)`;
let snake,dir,nextDir,food,score,alive,started,tick;

function reset(){
  snake=[{x:9,y:9},{x:8,y:9},{x:7,y:9}];
  dir=nextDir={x:1,y:0};score=0;alive=true;started=false;
  document.getElementById('score').textContent='0';
  overlay.style.display='flex';overlay.textContent='Tap to start';
  placeFood();draw();clearInterval(tick);
}
function placeFood(){
  do{food={x:Math.floor(Math.random()*SIZE),y:Math.floor(Math.random()*SIZE)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}
function startGame(){
  if(started)return;started=true;overlay.style.display='none';
  tick=setInterval(step,175);
}
function setDir(nx,ny){
  if(!started){startGame();return;}
  if(nx===-dir.x&&ny===-dir.y)return;
  nextDir={x:nx,y:ny};
}
function step(){
  if(!alive)return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.y<0||head.x>=SIZE||head.y>=SIZE||snake.some(s=>s.x===head.x&&s.y===head.y)){
    alive=false;clearInterval(tick);
    overlay.style.display='flex';overlay.textContent='Game over — tap to restart';
    return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;document.getElementById('score').textContent=score;placeFood();
  }else snake.pop();
  draw();
}
function draw(){
  board.innerHTML='';
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    const d=document.createElement('div');d.className='cell';
    if(snake[0].x===x&&snake[0].y===y)d.classList.add('head');
    else if(snake.some(s=>s.x===x&&s.y===y))d.classList.add('snake');
    else if(food.x===x&&food.y===y)d.classList.add('food');
    board.appendChild(d);
  }
}
overlay.onclick=()=>{if(!alive)reset();else startGame();};
document.querySelectorAll('.dpad button[data-d]').forEach(b=>{
  b.onclick=()=>{
    const m={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[b.dataset.d];
    setDir(m[0],m[1]);
  };
});
document.onkeydown=e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowup'||k==='w')setDir(0,-1);
  else if(k==='arrowdown'||k==='s')setDir(0,1);
  else if(k==='arrowleft'||k==='a')setDir(-1,0);
  else if(k==='arrowright'||k==='d')setDir(1,0);
  else if(k===' '){if(!alive)reset();else startGame();}
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key))e.preventDefault();
};
reset();
</script>
</body>
</html>
