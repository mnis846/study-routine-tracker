<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:linear-gradient(180deg,#1e1b4b,#312e81);overflow:hidden}
  #wrap{position:relative;width:100%;height:100vh;min-height:480px}
  canvas{display:block;width:100%;height:100%;cursor:pointer}
  .hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none;z-index:2}
  .pill{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;color:#e0e7ff}
</style>
</head>
<body>
<div id="wrap">
  <div class="hud">
    <span class="pill" id="score">Popped: 0</span>
    <span class="pill">🎈 Balloon Pop</span>
    <span class="pill" id="combo">x1</span>
  </div>
  <canvas id="c"></canvas>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,items=[],parts=[],score=0,combo=0,comboT=0;
const cols=['#f472b6','#fb7185','#fbbf24','#34d399','#60a5fa','#a78bfa','#f97316'];
function resize(){const r=canvas.parentElement.getBoundingClientRect();W=canvas.width=r.width;H=canvas.height=Math.max(480,r.height)}
window.onresize=resize;resize();
function spawn(){
  if(items.length>22)return;
  const r=16+Math.random()*26;
  items.push({x:r+Math.random()*(W-2*r),y:H+r,r,vy:-0.6-Math.random()*1.4,vx:(Math.random()-.5)*.5,
    c:cols[Math.random()*cols.length|0],w:Math.random()*6.28,str:0.8+Math.random()*.6});
}
function pop(b,x,y){
  combo=Math.min(combo+1,25);comboT=80;score++;
  document.getElementById('score').textContent='Popped: '+score;
  document.getElementById('combo').textContent='x'+combo;
  for(let i=0;i<16;i++){const a=Math.random()*6.28,s=2+Math.random()*5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35,c:b.c});}
}
function hitAt(clientX,clientY){
  const rect=canvas.getBoundingClientRect(),mx=(clientX-rect.left)*(W/rect.width),my=(clientY-rect.top)*(H/rect.height);
  for(let i=items.length-1;i>=0;i--){const b=items[i],dx=mx-b.x,dy=my-b.y;
    if(dx*dx+dy*dy<(b.r+12)*(b.r+12)){pop(b,b.x,b.y);items.splice(i,1);return;}}
  combo=0;document.getElementById('combo').textContent='x1';
}
canvas.onclick=e=>hitAt(e.clientX,e.clientY);
canvas.addEventListener('touchstart',e=>{
  if(!e.changedTouches.length)return;
  e.preventDefault();
  const t=e.changedTouches[0];
  hitAt(t.clientX,t.clientY);
},{passive:false});
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#312e81');g.addColorStop(1,'#4c1d95');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(Math.random()<.04)spawn();
  items.forEach(b=>{
    b.y+=b.vy*b.str;b.x+=b.vx+Math.sin(b.w)*.4;b.w+=.03;
    ctx.beginPath();ctx.ellipse(b.x,b.y+b.r*.55,b.r*.75,b.r*.95,0,0,6.28);
    ctx.fillStyle=b.c+'cc';ctx.fill();
    ctx.beginPath();ctx.moveTo(b.x,b.y+b.r*.9);ctx.quadraticCurveTo(b.x-3,b.y+b.r*1.7,b.x,b.y+b.r*2.1);
    ctx.strokeStyle='#94a3b8';ctx.lineWidth=1.2;ctx.stroke();
    ctx.beginPath();ctx.ellipse(b.x-b.r*.25,b.y-b.r*.35,b.r*.22,b.r*.28,-.5,0,6.28);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();
  });
  items=items.filter(b=>b.y>-b.r*2);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life--;ctx.globalAlpha=p.life/35;
    ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,3,3);ctx.globalAlpha=1;});
  parts=parts.filter(p=>p.life>0);
  if(comboT>0)comboT--;else if(combo){combo=0;document.getElementById('combo').textContent='x1';}
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
